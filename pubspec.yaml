name: uzii_shop
description: UziiShop - A modern Flutter e-commerce application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  animations: ^2.0.11
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  http: ^1.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.0
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#6C5DD3"
  adaptive_icon_foreground: "assets/images/app_icon.png"
